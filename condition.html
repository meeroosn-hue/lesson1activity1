<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <button onclick="myfunction()">try it</button>
        <p id="hour"></p>
        <p id="greet"></p>
        <script>
            function myfunction(){
                var greeting;
                var time=new Date().getHours();
                if (time < 10){
                    greeting="Good morning";
                }
                 else if(time < 20){
                    greeting="Good day";
                }
                else {
                    greeting="Good morning";
                }
                document.getElementById("hour").innerHTML="current hour is:"
                document.getElementById("greet").innerHTML="greeting"
            }
        </script>
    </body>
</html>
