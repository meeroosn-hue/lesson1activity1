<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Using Functions</title>
</head>

<body>

<h2>Multiplication Using JavaScript Function</h2>

<label>Enter First Number:</label>
<input type="number" id="num1"><br><br>

<label>Enter Second Number:</label>
<input type="number" id="num2"><br><br>

<button onclick="calculate()">Multiply</button>

<h3 id="result"></h3>

<script>
    // Function with parameters
    function multiply(a, b) {
        return a * b;
    }

    // Function to get input and show result
    function calculate() {
        let number1 = document.getElementById("num1").value;
        let number2 = document.getElementById("num2").value;

        let answer = multiply(number1, number2);

        document.getElementById("result").innerHTML = "Result: " + answer;
    }
</script>

</body>
</html>
