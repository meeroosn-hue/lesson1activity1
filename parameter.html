<!DOCTYPE html>
<html>
    <head>
        <title>perameter</title>
    </head>
    <body>
        <button onclick="add(2,5)">to add number</button>
        <button onclick="sub(5,2)">to sub number</button>
        <button onclick="div(10,5)">to div number</button>
        <button onclick="mul(5,2)">to mul number</button>
        <script>
            function add(a,b){
                document.write("a+b is" ,(a+b), ("<br>"));
            }
            function sub(a,b){
                document.write("a-b is" ,(a-b), ("<br>"));
            }
            function div(a,b){
                document.write("a/b is" ,(a/b), ("<br>"));
            }
            function mul(a,b){
                document.write("a*b is" ,(a * b), ("<br>"));
            }
        </script>
    </body>
</html>
