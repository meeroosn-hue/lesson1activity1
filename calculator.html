<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        .calculator {
            display: inline-block;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
        }

        input {
            width: 200px;
            height: 30px;
            margin: 10px;
            font-size: 16px;
        }

        button {
            width: 45px;
            height: 45px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Simple Calculator</h2>

    <div class="calculator">
        <input type="number" id="num1" placeholder="Enter first number">
        <br>
        <input type="number" id="num2" placeholder="Enter second number">
        <br>

        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>

        <div id="result"></div>
    </div>

    <script>
        function calculate(operator) {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result;

            if (operator === "+") {
                result = num1 + num2;
            } 
            else if (operator === "-") {
                result = num1 - num2;
            } 
            else if (operator === "*") {
                result = num1 * num2;
            }
            else if (operator === "/") {
                if (num2 === 0) {
                    result = "Cannot divide by zero!";
                } else {
                    result = num1 / num2;
                }
            }

            document.getElementById("result").innerText = "Result: " + result;
        }
    </script>

</body>
</html>
